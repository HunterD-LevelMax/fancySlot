<script>
        // Micro-interaction for Spin Button
        const spinBtn = document.getElementById('spin-btn');
        const cells = document.querySelectorAll('.reel-cell');
        const icons = ['diamond', 'nutrition', 'notifications', 'pentagon', 'filter_7', 'casino', 'stars'];
        const colors = ['text-primary', 'text-red-400', 'text-yellow-500', 'text-blue-400', 'text-primary', 'text-orange-400', 'text-purple-400'];

        spinBtn.addEventListener('click', () => {
            // Visual feedback
            spinBtn.classList.add('brightness-125');
            setTimeout(() => spinBtn.classList.remove('brightness-125'), 200);

            // Simulation of spinning
            cells.forEach((cell, index) => {
                const iconSpan = cell.querySelector('.material-symbols-outlined');
                
                // Add blur/spin animation effect
                cell.classList.add('transition-all', 'duration-100', 'blur-sm', 'scale-95');
                
                let count = 0;
                const interval = setInterval(() => {
                    const randomIdx = Math.floor(Math.random() * icons.length);
                    iconSpan.textContent = icons[randomIdx];
                    iconSpan.className = `material-symbols-outlined text-4xl ${colors[randomIdx]}`;
                    count++;
                    
                    if (count > 10 + (index * 2)) {
                        clearInterval(interval);
                        cell.classList.remove('blur-sm', 'scale-95');
                    }
                }, 80);
            });
        });

        // Initialize Material Symbols Weights
        document.querySelectorAll('[data-icon]').forEach(el => {
            el.classList.add('material-symbols-outlined');
        });
    </script>
