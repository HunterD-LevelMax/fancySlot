<style>
        body {
            background-color: #0f150e; /* surface color from config */
            overflow: hidden;
        }

        .loader-track {
            background-color: #3f4a3c; /* outline-variant */
            height: 2px;
            width: 140px;
            overflow: hidden;
            border-radius: 999px;
            position: relative;
        }

        .loader-fill {
            background-color: #4caf50; /* primary-container style */
            position: absolute;
            height: 100%;
            width: 30%;
            animation: loading 2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }

        @keyframes loading {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Material Neumorphic Recessed Container Style */
        .recessed-logo {
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
            border: 1px solid rgba(121, 121, 121, 0.1);
        }
    </style>
